version: '3.8'

services:
  # 1. Relational Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: football-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_stats
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Express Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/football_stats?schema=public
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/leagues || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 3. Nginx Static Frontend & Reverse Proxy
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: football-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # 4. Background Sync Ingestion Worker
  ingest-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-worker
    restart: always
    command: ["node", "dist/worker.cjs"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/football_stats?schema=public
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
